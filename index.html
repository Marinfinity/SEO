<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4.3 - Optimización de Imágenes</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    
    <header>
        <img src="./tinified/03_Logotipo.png" alt="Logotipo del sitio">
        <nav>
            <img src="./tinified/04_Icono_nav.png" alt="Icono de navegación" width="30"> Menú de Inicio
        </nav>
    </header>

    <section class="hero">
        <h1>Bienvenido a nuestra Web</h1>
        <img src="./tinified/01_Fotografia_Paisaje.jpg" alt="Imagen hero de portada">
    </section>

    <div class="container clearfix">
        <main class="main-content">
            <section class="team">
                <h2>Nuestro Equipo</h2>
                <img src="./tinified/02_Retrato.jpg" alt="Imagen de perfil del equipo">
            </section>

            <section class="infografia">
                <h2>Aprende más</h2>
                <img src="./tinified/05_Infografia.png" alt="Infografía con texto incrustado">
            </section>

            <section class="animacion">
                <h2>Novedades</h2>
                <img src="./tinified/07_Animacion_simple.gif" alt="Banner animado">
            </section>

            <section class="products">
                <h2>Tienda Online</h2>
                <img src="./tinified/08_Imagen_producto.webp" alt="Imagen de producto">
            </section>

            <section class="modern-img">
                <h2>Galería Moderna</h2>
                <img src="./tinified/10_Fotografia_alta_calidad.avif" alt="Imagen moderna optimizada">
            </section>
        </main>

        <aside class="sidebar">
            <h3>Publicidad</h3>
            <img src="./tinified/06_Banner_publicitario.jpg" alt="Banner publicitario sidebar">
        </aside>
    </div>

    <footer class="clearfix">
        <p>© 2026 - Ejercicio de Optimización</p>
        <div class="footer-icons">
            <img src="./tinified/09_Icono_escalable.svg" alt="Icono escalable footer" width="50">
        </div>
    </footer>

</body>

</html>
